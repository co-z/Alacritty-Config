general.live_config_reload = true
# General settings
general.import = ["~/.config/alacritty/themes/themes/gruvbox_material_medium_dark.toml"]

[window]
padding = { x = 5, y = 5 }
dynamic_padding = true
opacity = 0.8

[font]
size = 12.0
normal = { family = "Cascadia Code", style = "Regular" }

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Block", blinking = "On" }
